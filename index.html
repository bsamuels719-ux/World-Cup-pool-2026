function scoreGroups(picks,act){let t=0;GROUPS.forEach(({id})=>{if(!picks[id]||!act[id])return;const p=picks[id],a=act[id];let s=0;if(p[0]&&p[0]===a[0])s+=3;else if(p[0]&&(p[0]===a[0]||p[0]===a[1]))s+=1;if(p[1]&&p[1]===a[1])s+=3;else if(p[1]&&(p[1]===a[0]||p[1]===a[1]))s+=1;t+=s;});return t;}
function scoreWildcards(gp,wcr,aWC,aG){let t=0;const picks=(wcr||[]).slice(0,8);if(!picks.length||!aWC||!aWC.length)return 0;picks.forEach(team=>{if(!aWC.includes(team))return;let pp=null,ap=null;GROUPS.forEach(({id})=>{if(gp[id]){const i=gp[id].indexOf(team);if(i!==-1)pp=i;}if(aG[id]){const i=aG[id].indexOf(team);if(i!==-1)ap=i;}});t+=ap===2?(pp===2?3:1):1;});return t;}
function scoreBracket(bp,ab){let t=0;if(!bp||!ab)return 0;["R32","R16","QF","SF","F"].forEach(r=>{if(!bp[r]||!ab[r])return;bp[r].forEach(x=>{if(ab[r].includes(x))t+=ROUND_PTS[r];});});if(bp.Champion&&ab.Champion&&bp.Champion===ab.Champion)t+=15;return t;}

function resolveR32(gp,wcr){
  const g=id=>(gp[id]||GROUPS.find(x=>x.id===id).teams);
  const src={};GROUPS.forEach(x=>{src[g(x.id)[2]]=x.id;});
  const wc=(wcr||[]).slice(0,8);
  const row=FIFA_ANNEX_C[wc.map(t=>src[t]).filter(Boolean).sort().join("")]||null;
  const tfg=grp=>{if(!grp)return"TBD";return wc.find(t=>src[t]===grp)||"TBD";};
  const tmc={74:3,77:5,79:0,80:7,81:2,82:4,85:1,87:6};
  return R32_STRUCTURE.map(slot=>{
    const get=(type,grp,mn)=>{
      if(type==="winner")return g(grp)[0]||"TBD";
      if(type==="runner")return g(grp)[1]||"TBD";
      if(type==="third"){if(row&&tmc[mn]!==undefined)return tfg(row[tmc[mn]]);return"TBD";}
      return"TBD";
    };
    return{match:slot.match,a:get(slot.aType,slot.aGroup,slot.match),b:get(slot.bType,slot.bGroup,slot.match)};
  });
}

// ─── BRACKET ──────────────────────────────────────────────────────────────────
function Bracket({r32,picks,setPicks,readOnly}){
  const pr32=(i,team)=>{if(readOnly)return;const{a,b}=r32[i];setPicks(p=>{const cur=p.R32||[];if(cur.includes(team))return{...p,R32:cur.filter(t=>t!==team)};return{...p,R32:cur.filter(t=>t!==a&&t!==b).concat(team)};});};
  const pL=(round,team,limit)=>{if(readOnly)return;setPicks(p=>{
    const c=p[round]||[];
    if(c.includes(team))return{...p,[round]:c.filter(t=>t!==team)};
    let opponent=null;
    const pool=round==="R16"?R32w:round==="QF"?R16w:round==="SF"?QFw:round==="F"?SFw:[];

    const filtered=opponent?c.filter(t=>t!==opponent):c;
    if(filtered.length>=limit&&!opponent)return p;
    return{...p,[round]:[...filtered,team]};
  });};
  const R32w=picks.R32||[],R16t=R32w,R16w=picks.R16||[],QFt=R16w,QFw=picks.QF||[],SFt=QFw,SFw=picks.SF||[],Ft=SFw,Fw=picks.F||[];

  const r16p=bp(R16t,R16_PAIRS),qfp=bp(QFt,QF_PAIRS),sfp=bp(SFt,SF_PAIRS),fp=bp(Ft,F_PAIRS);

        </div>

                    {isC&&<span>🏆</span>}
                  </div>
                );})}
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  );
}

function bracketComplete(bp){
  if(!bp)return{complete:false,missing:["all picks"]};
  const missing=[];
  if((bp.R32||[]).length<16)missing.push(`R32 ${(bp.R32||[]).length}/16`);
  if((bp.R16||[]).length<8)missing.push(`R16 ${(bp.R16||[]).length}/8`);
  if((bp.QF||[]).length<4)missing.push(`QF ${(bp.QF||[]).length}/4`);
  if((bp.SF||[]).length<2)missing.push(`SF ${(bp.SF||[]).length}/2`);
  if((bp.F||[]).length<1)missing.push("Final");
  if(!bp.Champion)missing.push("Champion");
  return{complete:missing.length===0,missing};
}

function Leaderboard({entries,actuals,onEdit}){
  const locked=isLocked();
  const[viewing,setViewing]=useState(null);
  const[pinModal,setPinModal]=useState(null);
  const[editName,setEditName]=useState("");
  const[editErr,setEditErr]=useState("");
  const[showEditBox,setShowEditBox]=useState(false);

  // Calculate max possible points remaining for each entry
  function maxPossible(e, actuals){
    // Already scored points
    const g=scoreGroups(e.groupPicks||{},actuals.groupResults||{});
    const w=scoreWildcards(e.groupPicks||{},e.wcRanking||[],actuals.wildcards||[],actuals.groupResults||{});
    const b=scoreBracket(e.bracketPicks||{},actuals.bracket||{});
    const current=g+w+b;
    // Max remaining from bracket rounds not yet decided
    const ab=actuals.bracket||{};
    const bp=e.bracketPicks||{};
    let remaining=0;
    // For each round, if actual not yet set, add pts for each pick still alive
    const roundsLeft={R32:3,R16:5,QF:7,SF:9,F:11,Champion:15};
    ["R32","R16","QF","SF","F"].forEach(r=>{
      const actualPicks=ab[r]||[];
      const myPicks=bp[r]||[];
      // If round not completed yet in actuals, count unscored picks as potentially scoreable
      myPicks.forEach(t=>{
        if(!actualPicks.includes(t)) remaining+=roundsLeft[r];
      });
    });
    if(bp.Champion&&!ab.Champion) remaining+=15;
    // Add group/wildcard max remaining (simplified: ungiven groups)
    const missingGroups=GROUPS.filter(g=>!actuals.groupResults[g.id]);
    remaining+=missingGroups.length*6; // max 6pts per group
    return current+remaining;
  }

  const scored=entries.map(e=>{
    const g=scoreGroups(e.groupPicks||{},actuals.groupResults||{});
    const w=scoreWildcards(e.groupPicks||{},e.wcRanking||[],actuals.wildcards||[],actuals.groupResults||{});
    const b=scoreBracket(e.bracketPicks||{},actuals.bracket||{});
    const bc=bracketComplete(e.bracketPicks);
    const mp=maxPossible(e,actuals);
    return{...e,total:g+w+b,gPts:g,wPts:w,bPts:b,bracketOk:bc.complete,bracketMissing:bc.missing,maxPts:mp};
  }).sort((a,b)=>b.total-a.total||(b.bracketPicks?.Champion===actuals.bracket?.Champion?1:0)-(a.bracketPicks?.Champion===actuals.bracket?.Champion?1:0));

  function tryEdit(){
    const match=entries.find(e=>e.name.trim().toLowerCase()===editName.trim().toLowerCase());
    if(!match){setEditErr("No entry found with that name.");return;}
    setEditErr("");
    if(match.pin){setPinModal({mode:"verify",entry:match});}
    else{setPinModal({mode:"set",entry:match});}
  }

  return(
    <div>
      {locked&&viewing&&<EntryViewer entry={viewing} onClose={()=>setViewing(null)}/>}
      {pinModal&&<PinModal
        mode={pinModal.mode}
        name={pinModal.entry.name}
        existingPin={pinModal.entry.pin}
        onCancel={()=>setPinModal(null)}
        onSuccess={(pin)=>{
          setPinModal(null);
          if(pinModal.mode==="set"){onEdit({...pinModal.entry,pin},true);}
          else{onEdit(pinModal.entry,false);}
        }}
      />}
      <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
        <h2 style={{fontSize:22,fontWeight:900,color:"#c9a227",letterSpacing:3,margin:0,fontFamily:"'Courier New',monospace"}}>LEADERBOARD</h2>
        <span style={{fontSize:10,color:"#333",fontFamily:"'Courier New',monospace"}}>{scored.length} entries</span>
      </div>
      {!locked&&<div style={{marginBottom:14}}>
        {!showEditBox
          ?<button style={{...S.ghost,fontSize:10,padding:"6px 12px"}} onClick={()=>setShowEditBox(true)}>✏ Edit my picks</button>
          :<div style={{padding:"12px 14px",background:"rgba(201,162,39,0.05)",border:"1px solid rgba(201,162,39,0.12)",borderRadius:8}}>
            <div style={{fontSize:10,color:"#c9a227",fontWeight:700,marginBottom:8,fontFamily:"'Courier New',monospace",letterSpacing:1}}>✏ EDIT MY PICKS</div>
            <p style={{fontSize:10,color:"#555",marginBottom:10,fontFamily:"'Courier New',monospace"}}>Enter your name to access your entry.</p>
            <div style={{display:"flex",gap:6}}>
              <input style={{...S.inp,flex:1,padding:"8px 10px",fontSize:11}} placeholder="Your name..." value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryEdit()}/>
              <button style={{...S.gold,padding:"8px 14px",fontSize:10,whiteSpace:"nowrap"}} onClick={tryEdit}>GO</button>
              <button style={{...S.ghost,padding:"8px 10px",fontSize:10}} onClick={()=>{setShowEditBox(false);setEditName("");setEditErr("");}}>✕</button>
            </div>
            {editErr&&<p style={{fontSize:10,color:"#a44",marginTop:6,fontFamily:"'Courier New',monospace"}}>{editErr}</p>}
          </div>
        }
      </div>}
      {locked&&<p style={{fontSize:10,color:"#555",marginBottom:14,fontFamily:"'Courier New',monospace"}}>Tap any entry to view their full picks.</p>}
      {!locked&&<p style={{fontSize:10,color:"#555",marginBottom:6,fontFamily:"'Courier New',monospace"}}>Picks and champion picks visible after lock on June 11 at 3pm ET.</p>}
      {scored.length===0&&<p style={{color:"#3a3a3a",fontSize:12,fontFamily:"'Courier New',monospace"}}>No entries yet.</p>}
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {scored.map((e,i)=>(
          <div key={e.name} onClick={()=>locked&&setViewing(e)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:i===0?"rgba(201,162,39,0.07)":"rgba(255,255,255,0.02)",border:`1px solid ${i===0?"rgba(201,162,39,0.25)":!e.bracketOk&&!locked?"rgba(180,100,0,0.25)":"rgba(255,255,255,0.05)"}`,borderRadius:7,cursor:locked?"pointer":"default"}}>
            <span style={{fontSize:16,minWidth:24}}>{"🥇🥈🥉".split("").slice(i*2,i*2+2).join("")||`${i+1}.`}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:700,fontSize:13,color:"#ddd"}}>{e.name}</span>
                <span style={{fontSize:8,color:"#555",fontFamily:"'Courier New',monospace"}}>#{i+1}</span>
              </div>
              {locked&&(e.bracketPicks?.Champion
                ?<div style={{fontSize:10,color:"#888",marginTop:2,display:"flex",alignItems:"center",gap:3}}><span style={{fontSize:12}}>{FLAGS[e.bracketPicks.Champion]||"🏳"}</span><span style={{fontFamily:"'Courier New',monospace"}}>{e.bracketPicks.Champion}</span></div>
                :<div style={{fontSize:9,color:"#3a3a3a",marginTop:2,fontFamily:"'Courier New',monospace"}}>no champion picked</div>
              )}
              {!locked&&(e.bracketOk
                ?<div style={{fontSize:9,color:"#4a8",marginTop:2,fontFamily:"'Courier New',monospace"}}>✓ bracket complete</div>
                :<div style={{fontSize:9,color:"#c96",marginTop:2,fontFamily:"'Courier New',monospace"}}>⚠ incomplete: {e.bracketMissing.join(" · ")}</div>
              )}
              <div style={{fontSize:8,color:"#444",marginTop:2,fontFamily:"'Courier New',monospace"}}>max possible: <b style={{color:"#666"}}>{e.maxPts}</b></div>
            </div>
            <div style={{display:"flex",gap:8,fontSize:10,color:"#444",fontFamily:"'Courier New',monospace"}}>
              <span>G:<b style={{color:"#777"}}>{e.gPts}</b></span>
              <span>W:<b style={{color:"#777"}}>{e.wPts}</b></span>
              <span>B:<b style={{color:"#777"}}>{e.bPts}</b></span>
            </div>
            <span style={{fontSize:20,fontWeight:900,color:i===0?"#c9a227":"#bbb",minWidth:36,textAlign:"right",fontFamily:"'Courier New',monospace"}}>{e.total}</span>
            {locked&&<span style={{fontSize:10,color:"#444"}}>›</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){

  const[adminErr,setAErr]=useState("");
  const[step,setStep]=useState(0);
  const[submitted,setSub]=useState(false);
  const[showRules,setRules]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[syncMsg,setSyncMsg]=useState("");
  const[entries,setEntries]=useState([]);
  const[actuals,setActuals]=useState(EMPTY_ACT);
  const[loaded,setLoaded]=useState(false);
  const[gp,setGP]=useState({});
  const[wcr,setWCR]=useState([]);
  const[bp,setBP]=useState(EMPTY_BP);
  const[pendingPin,setPendingPin]=useState(null); // pin to save on submit
  const[showSetPin,setShowSetPin]=useState(false);

  const[hasSubmitted,setHasSubmitted]=useState(()=>{
    try{return !!localStorage.getItem(SUBMITTED_KEY);}catch(e){return false;}
  });

  const flash=(ok)=>{setSyncMsg(ok?"✓ saved":"⚠ failed");setTimeout(()=>setSyncMsg(""),2500);};

  useEffect(()=>{
    (async()=>{
      setSyncing(true);
      try{
        const[e,a]=await Promise.all([fbGet("entries"),fbGet("actuals")]);
        if(e&&typeof e==="object"&&!Array.isArray(e))setEntries(Object.values(e));
        else if(Array.isArray(e))setEntries(e);
        if(a)setActuals(a);
      }catch(err){console.error(err);}
      finally{setLoaded(true);setSyncing(false);}
    })();
  },[]);

  useEffect(()=>{
    if(screen!=="leaderboard")return;
    const id=setInterval(async()=>{
      const[e,a]=await Promise.all([fbGet("entries"),fbGet("actuals")]);
      if(e&&typeof e==="object"&&!Array.isArray(e))setEntries(Object.values(e));
      else if(Array.isArray(e))setEntries(e);
      if(a)setActuals(a);
    },15000);
    return()=>clearInterval(id);
  },[screen]);

  const refresh=async()=>{
    setSyncing(true);
    const[e,a]=await Promise.all([fbGet("entries"),fbGet("actuals")]);
    if(e&&typeof e==="object"&&!Array.isArray(e))setEntries(Object.values(e));
    else if(Array.isArray(e))setEntries(e);
    if(a)setActuals(a);
    setSyncing(false);setSyncMsg("✓ refreshed");setTimeout(()=>setSyncMsg(""),2000);
  };

  const saveEntry=async(entry)=>{
    setSyncing(true);
    const key=entry.name.replace(/[^a-zA-Z0-9_-]/g,"_");

      // Get the actual 3rd place team from each group's entered standings
      const thirds=GROUPS.map(g=>{
        const res=actuals.groupResults[g.id];
        // Only use entered result if it has all 4 teams
        return (res&&res.length===4)?res[2]:g.teams[2];
      });
      const sel=(actuals._wcRanking||actuals.wildcards||[]);
      // Build full 12-team ranking: start from saved ranking, 
      // replace any team no longer a 3rd-placer with the correct one
      if(sel.length===12){
        const seen=new Set();
        const result=sel.map(t=>{
          if(thirds.includes(t)&&!seen.has(t)){seen.add(t);return t;}
          const replacement=thirds.find(x=>!seen.has(x));
          if(replacement){seen.add(replacement);return replacement;}
          return t;
        });
        // Ensure all thirds present
        thirds.forEach(t=>{if(!result.includes(t)){const i=result.findIndex(x=>!thirds.includes(x));if(i!==-1)result[i]=t;}});
        return result;
      }

      {h:"GROUP STAGE COMPLETE — THE COMMISSIONER SPEAKS",ps:[

            <div style={{fontSize:12,fontWeight:900,color:"#c9a227",marginBottom:10,fontFamily:"'Courier New',monospace",letterSpacing:1,borderBottom:"1px solid rgba(201,162,39,0.15)",paddingBottom:7}}>👥 THE CAST</div>
            {[
              {n:"48 Teams, No Clue! 🇧🇷",t:"Barry. Brian's dad. Just moved to North Carolina with Brian's mom to retire, and will be heading up to Connecticut in July to house-sit and keep Stormy and Cooper company while the group is in France. Brazil topped their group. Barry does not know this. When last reached, sources indicate he said 'sounds good' and went to take his contacts out — which is Barry's universal signal that he is done for the evening. He will not be coming back."},

              {n:"Caroline 🇫🇷",t:"Gordon's wife and one of Alex and Brian's closest friends in Connecticut. She picks teams based on how the name sounds or what the colors look like, which is as valid a strategy as any. France sounded right to her. France went 3-0. Caroline does not know this and is not checking. She drove Alex and Brian to the emergency room on their wedding day and did not panic once, which tells you everything you need to know about how she handles high-pressure situations. This bracket is not a high-pressure situation for Caroline."},
              {n:"Chris L 🇪🇸",t:"Brian's cousin and, by general consensus, the wildcard of the France trip — the Charlie Kelly of this particular group. First time leaving the country. Before departure, asked — in complete sincerity — whether France has coffee. It does, Chris. France invented the café. They will have one on every corner. Chris picked Spain, who won their group without conceding a goal, and is currently in first place. The Commissioner has checked this multiple times. The man who did not know France had coffee is leading this pool."},
              {n:"Croissant 🇫🇷",t:"Kat. Alex's best friend and maid of honor, part of the Chicago trio with Carly. She ran her own restaurant for years and has the kind of taste in food and wine that makes dining with her a very good idea. She has not checked the score. She is more interested in what's for dinner and in making Sound of Music references with Caroline. She says she will become part croissant by the end of this trip and has committed to this with full sincerity. A bartender once told Alex that Kat was being cut off because he looked into her eyes and there was nothing there. The Commissioner believes what he saw was peace."},
              {n:"Eric 🇵🇹",t:"Brian's brother. Architect. Six years younger and also bigger, which Brian has not forgotten. Just returned from six months in Miami with his dog Hazey. Has developed a habit of finding the most iconic spot in every country he visits and posing like a lion or a ram for a photo — full commitment, no irony. Picked Portugal, who finished second in their group behind Colombia. Is currently in last place. Eric builds things for a living and the Commissioner expects a structural comeback. Worth noting: Brian once organized a barefoot World Cup tournament with the group, put a slide tackle on Eric in the finals that sent him into the ground, and Brian's team won. Eric organized future tournaments. Brian did not stop slide tackling."},

            <p style={{fontSize:10,color:"#2a2a2a",marginTop:14,fontFamily:"'Courier New',monospace",fontStyle:"italic",textAlign:"center"}}>This pool was built by AI. The Commissioner is the AI. Brian told it to roast his friends. It complied willingly.</p>

}
