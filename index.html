function scoreGroups(picks,act){let t=0;GROUPS.forEach(({id})=>{if(!picks[id]||!act[id])return;const p=picks[id],a=act[id];let s=0;if(p[0]&&p[0]===a[0])s+=3;else if(p[0]&&(p[0]===a[0]||p[0]===a[1]))s+=1;if(p[1]&&p[1]===a[1])s+=3;else if(p[1]&&(p[1]===a[0]||p[1]===a[1]))s+=1;t+=s;});return t;}
function scoreWildcards(gp,wcr,aWC,aG){let t=0;const picks=(wcr||[]).slice(0,8);if(!picks.length||!aWC||!aWC.length)return 0;picks.forEach(team=>{if(!aWC.includes(team))return;let pp=null,ap=null;GROUPS.forEach(({id})=>{if(gp[id]){const i=gp[id].indexOf(team);if(i!==-1)pp=i;}if(aG[id]){const i=aG[id].indexOf(team);if(i!==-1)ap=i;}});t+=ap===2?(pp===2?3:1):1;});return t;}
function scoreBracket(bp,ab){let t=0;if(!bp||!ab)return 0;["R32","R16","QF","SF","F"].forEach(r=>{if(!bp[r]||!ab[r])return;bp[r].forEach(x=>{if(ab[r].includes(x))t+=ROUND_PTS[r];});});if(bp.Champion&&ab.Champion&&bp.Champion===ab.Champion)t+=15;return t;}

function resolveR32(gp,wcr){
  const g=id=>(gp[id]||GROUPS.find(x=>x.id===id).teams);
  const src={};GROUPS.forEach(x=>{src[g(x.id)[2]]=x.id;});
  const wc=(wcr||[]).slice(0,8);
  const row=FIFA_ANNEX_C[wc.map(t=>src[t]).filter(Boolean).sort().join("")]||null;
  const tfg=grp=>{if(!grp)return"TBD";return wc.find(t=>src[t]===grp)||"TBD";};
  const tmc={74:3,77:5,79:0,80:7,81:2,82:4,85:1,87:6};
  return R32_STRUCTURE.map(slot=>{
    const get=(type,grp,mn)=>{
      if(type==="winner")return g(grp)[0]||"TBD";
      if(type==="runner")return g(grp)[1]||"TBD";
      if(type==="third"){if(row&&tmc[mn]!==undefined)return tfg(row[tmc[mn]]);return"TBD";}
      return"TBD";
    };
    return{match:slot.match,a:get(slot.aType,slot.aGroup,slot.match),b:get(slot.bType,slot.bGroup,slot.match)};
  });
}

    if(filtered.length>=limit&&!opponent)return p;

  const r16p=bp(R16t,R16_PAIRS),qfp=bp(QFt,QF_PAIRS),sfp=bp(SFt,SF_PAIRS),fp=bp(Ft,F_PAIRS);

function bracketComplete(bp){
  if(!bp)return{complete:false,missing:["all picks"]};
  const missing=[];
  if((bp.R32||[]).length<16)missing.push(`R32 ${(bp.R32||[]).length}/16`);
  if((bp.R16||[]).length<8)missing.push(`R16 ${(bp.R16||[]).length}/8`);
  if((bp.QF||[]).length<4)missing.push(`QF ${(bp.QF||[]).length}/4`);
  if((bp.SF||[]).length<2)missing.push(`SF ${(bp.SF||[]).length}/2`);
  if((bp.F||[]).length<1)missing.push("Final");
  if(!bp.Champion)missing.push("Champion");
  return{complete:missing.length===0,missing};
}

function Leaderboard({entries,actuals,onEdit}){
  const locked=isLocked();
  const[viewing,setViewing]=useState(null);
  const[pinModal,setPinModal]=useState(null);
  const[editName,setEditName]=useState("");
  const[editErr,setEditErr]=useState("");
  const[showEditBox,setShowEditBox]=useState(false);

  const scored=entries.map(e=>{
    const g=scoreGroups(e.groupPicks||{},actuals.groupResults||{});
    const w=scoreWildcards(e.groupPicks||{},e.wcRanking||[],actuals.wildcards||[],actuals.groupResults||{});
    const b=scoreBracket(e.bracketPicks||{},actuals.bracket||{});
    const bc=bracketComplete(e.bracketPicks);
    return{...e,total:g+w+b,gPts:g,wPts:w,bPts:b,bracketOk:bc.complete,bracketMissing:bc.missing};
  }).sort((a,b)=>b.total-a.total||(b.bracketPicks?.Champion===actuals.bracket?.Champion?1:0)-(a.bracketPicks?.Champion===actuals.bracket?.Champion?1:0));

  function tryEdit(){
    const match=entries.find(e=>e.name.trim().toLowerCase()===editName.trim().toLowerCase());
    if(!match){setEditErr("No entry found with that name.");return;}
    setEditErr("");
    if(match.pin){setPinModal({mode:"verify",entry:match});}
    else{setPinModal({mode:"set",entry:match});}
  }

  return(
    <div>
      {locked&&viewing&&<EntryViewer entry={viewing} onClose={()=>setViewing(null)}/>}
      {pinModal&&<PinModal

      </div>
      {!locked&&<div style={{marginBottom:14}}>
        {!showEditBox
          ?<button style={{...S.ghost,fontSize:10,padding:"6px 12px"}} onClick={()=>setShowEditBox(true)}>✏ Edit my picks</button>
          :<div style={{padding:"12px 14px",background:"rgba(201,162,39,0.05)",border:"1px solid rgba(201,162,39,0.12)",borderRadius:8}}>
            <div style={{fontSize:10,color:"#c9a227",fontWeight:700,marginBottom:8,fontFamily:"'Courier New',monospace",letterSpacing:1}}>✏ EDIT MY PICKS</div>
            <p style={{fontSize:10,color:"#555",marginBottom:10,fontFamily:"'Courier New',monospace"}}>Enter your name to access your entry.</p>
            <div style={{display:"flex",gap:6}}>
              <input style={{...S.inp,flex:1,padding:"8px 10px",fontSize:11}} placeholder="Your name..." value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryEdit()}/>
              <button style={{...S.gold,padding:"8px 14px",fontSize:10,whiteSpace:"nowrap"}} onClick={tryEdit}>GO</button>
              <button style={{...S.ghost,padding:"8px 10px",fontSize:10}} onClick={()=>{setShowEditBox(false);setEditName("");setEditErr("");}}>✕</button>
            </div>
            {editErr&&<p style={{fontSize:10,color:"#a44",marginTop:6,fontFamily:"'Courier New',monospace"}}>{editErr}</p>}
          </div>
        }
      </div>}
      {locked&&<p style={{fontSize:10,color:"#555",marginBottom:14,fontFamily:"'Courier New',monospace"}}>Tap any entry to view their full picks.</p>}
      {!locked&&<p style={{fontSize:10,color:"#555",marginBottom:6,fontFamily:"'Courier New',monospace"}}>Picks and champion picks visible after lock on June 11 at 3pm ET.</p>}
      {scored.length===0&&<p style={{color:"#3a3a3a",fontSize:12,fontFamily:"'Courier New',monospace"}}>No entries yet.</p>}

            <span style={{fontSize:16,minWidth:24}}>{"🥇🥈🥉".split("").slice(i*2,i*2+2).join("")||`${i+1}.`}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:13,color:"#ddd"}}>{e.name}</div>

                :<div style={{fontSize:9,color:"#3a3a3a",marginTop:2,fontFamily:"'Courier New',monospace"}}>no champion picked</div>
              )}
              {!locked&&(e.bracketOk
                ?<div style={{fontSize:9,color:"#4a8",marginTop:2,fontFamily:"'Courier New',monospace"}}>✓ bracket complete</div>

            {locked&&<span style={{fontSize:10,color:"#444"}}>›</span>}

        ))}
      </div>
    </div>
  );

    try{return !!localStorage.getItem(SUBMITTED_KEY);}catch(e){return false;}
  });

  const flash=(ok)=>{setSyncMsg(ok?"✓ saved":"⚠ failed");setTimeout(()=>setSyncMsg(""),2500);};

  useEffect(()=>{
    (async()=>{
      setSyncing(true);
      try{
        const[e,a]=await Promise.all([fbGet("entries"),fbGet("actuals")]);
        if(e&&typeof e==="object"&&!Array.isArray(e))setEntries(Object.values(e));
        else if(Array.isArray(e))setEntries(e);
        if(a)setActuals(a);
      }catch(err){console.error(err);}
      finally{setLoaded(true);setSyncing(false);}
    })();
  },[]);

  useEffect(()=>{
    if(screen!=="leaderboard")return;
    const id=setInterval(async()=>{
      const[e,a]=await Promise.all([fbGet("entries"),fbGet("actuals")]);
      if(e&&typeof e==="object"&&!Array.isArray(e))setEntries(Object.values(e));
      else if(Array.isArray(e))setEntries(e);
      if(a)setActuals(a);
    },15000);
    return()=>clearInterval(id);
  },[screen]);

  const refresh=async()=>{
    setSyncing(true);
    const[e,a]=await Promise.all([fbGet("entries"),fbGet("actuals")]);
    if(e&&typeof e==="object"&&!Array.isArray(e))setEntries(Object.values(e));
    else if(Array.isArray(e))setEntries(e);
    if(a)setActuals(a);
    setSyncing(false);setSyncMsg("✓ refreshed");setTimeout(()=>setSyncMsg(""),2000);
  };

  const saveEntry=async(entry)=>{
    setSyncing(true);
    const key=entry.name.replace(/[^a-zA-Z0-9_-]/g,"_");

    setEntries(prev=>[...prev.filter(e=>e.name!==entry.name),entry]);
    flash(ok);setSyncing(false);
  };

  const saveActuals=async(data)=>{
    setActuals(data);setSyncing(true);
    const ok=await fbSet("actuals",data);
    flash(ok);setSyncing(false);
  };

  const deleteEntry=async(n)=>{
    setSyncing(true);
    const key=n.replace(/[^a-zA-Z0-9_-]/g,"_");
    await fbDelete(`entries/${key}`);
    setEntries(prev=>prev.filter(e=>e.name!==n));
    flash(true);setSyncing(false);
  };

  const resetPin=async(entryName)=>{
    const entry=entries.find(e=>e.name===entryName);
    if(!entry)return;
    const updated={...entry,pin:""};
    await saveEntry(updated);
  };

  const ensureGP=()=>{const f={...gp};GROUPS.forEach(g=>{if(!f[g.id]||f[g.id].length!==4)f[g.id]=[...g.teams];});return f;};
  const ensureWCR=(g)=>{if(wcr.length===12)return wcr;return GROUPS.map(x=>(g[x.id]||x.teams)[2]);};

  const SB=()=>(
    <div style={{display:"flex",alignItems:"center",gap:6}}>

      {!syncing&&syncMsg&&<span style={{fontSize:9,color:syncMsg.startsWith("✓")?"#4a8":"#a44",fontFamily:"'Courier New',monospace"}}>{syncMsg}</span>}
    </div>
  );

  const r32=resolveR32(gp,wcr.length===12?wcr:GROUPS.map(g=>(gp[g.id]||g.teams)[2]));

  if(!loaded)return(

      const thirds=GROUPS.map(g=>{

        // Only use entered result if it has all 4 teams

          if(thirds.includes(t)&&!seen.has(t)){seen.add(t);return t;}
          const replacement=thirds.find(x=>!seen.has(x));
          if(replacement){seen.add(replacement);return replacement;}
          return t;
        });
        // Ensure all thirds present
        thirds.forEach(t=>{if(!result.includes(t)){const i=result.findIndex(x=>!thirds.includes(x));if(i!==-1)result[i]=t;}});
        return result;
      }
      return thirds;
    })();

    const abp={R32:actuals.bracket?.R32||[],R16:actuals.bracket?.R16||[],QF:actuals.bracket?.QF||[],SF:actuals.bracket?.SF||[],F:actuals.bracket?.F||[],Champion:actuals.bracket?.Champion||null};

                <div key={e.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"rgba(255,255,255,0.02)",borderRadius:5,flexWrap:"wrap",gap:6}}>
                  <span style={{color:"#aaa",fontWeight:600,fontSize:12,flex:1}}>{e.name}</span>
                  <span style={{color:"#555",fontSize:9,fontFamily:"'Courier New',monospace"}}>PIN: <b style={{color:e.pin?"#c9a227":"#444"}}>{e.pin||"not set"}</b></span>
                  <span style={{color:"#333",fontSize:9,fontFamily:"'Courier New',monospace"}}>{new Date(e.submittedAt).toLocaleDateString()}</span>
                  <button style={{...S.ghost,padding:"2px 8px",fontSize:9}} onClick={()=>resetPin(e.name)}>Reset PIN</button>
                  <button style={{...S.ghost,padding:"2px 8px",fontSize:9,borderColor:"rgba(180,50,50,0.3)",color:"#a44"}} onClick={()=>deleteEntry(e.name)}>Delete</button>
                </div>
              ))}
            </div>}
          </div>

          <span style={S.sh}>Actual Group Results</span>
          <p style={{color:"#3a3a3a",fontSize:10,marginBottom:12,fontFamily:"'Courier New',monospace"}}>Rank each group by actual final standings.</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(248px,1fr))",gap:10,marginBottom:16}}>
            {GROUPS.map(g=>(
              <div key={g.id} style={S.card}>
                <div style={{fontWeight:900,fontSize:9,color:"#c9a227",marginBottom:7,letterSpacing:2,fontFamily:"'Courier New',monospace"}}>GROUP {g.id}</div>

            ))}
          </div>

          <span style={S.sh}>Actual Wildcard Advancers</span>
          <p style={{color:"#3a3a3a",fontSize:10,marginBottom:10,fontFamily:"'Courier New',monospace"}}>Top 8 are the actual wildcards. Sets bracket slots via FIFA Annex C.</p>
          <div style={S.card}>
            <WildcardRanker
              groupPicks={Object.fromEntries(GROUPS.map(g=>{
                const res=actuals.groupResults[g.id];
                return [g.id, (res&&res.length===4)?res:g.teams];
              }))}
              wcRanking={awcr}
              onChange={r=>saveActuals({...actuals,wildcards:r.slice(0,8),_wcRanking:r})}/>
          </div>

          <span style={S.sh}>Actual Bracket Results</span>
          <p style={{color:"#3a3a3a",fontSize:10,marginBottom:10,fontFamily:"'Courier New',monospace"}}>Enter real results. Leaderboard updates for everyone immediately.</p>
          <Bracket r32={ar32} picks={abp} setPicks={setABP}/>

          <div style={{textAlign:"center",color:"#1a1a1a",fontSize:9,marginTop:4,paddingBottom:16,fontFamily:"'Courier New',monospace"}}>
            all saves go to firebase · no login required for participants
          </div>
        </div>
      </div>
    );
  }


  // REPORT
  if(screen==="report"){
    const sections=[

      {h:"🇦🇷 CARLY — Champion: Argentina",ps:[

      {h:"⚡ POWER RANKINGS — POST GROUP STAGE",ps:[
        "#1 🇦🇷 CARLY — THE FRONTRUNNER\nArgentina went 3-0-0 with 9 points — the best group stage record in the entire tournament. Carly picked them without stress. She did not overthink this. She has a don't-give-a-shit attitude and it is currently paying dividends.",
        "#2 🇫🇷 MBAPPE EVER AFTER — THE FAVORITE (obviously)\nFrance went 3-0 and scored 10 goals. Alex picked France. Alex is the favorite in this family, in this pool, and in most rooms she enters. The Commissioner would bet against her but has decided that would be unwise.",
        "#3 🇪🇸 BRIAN — THE COMMISSIONER (conflicted)\nSpain won their group without conceding a goal. Brian built the app, entered the pool, and is now ranking himself third in his own power rankings. This is either hubris or accurate self-assessment. The pool did not fail. He will remind everyone of this at least twice per day in France.",
        "#4 🏴󠁧󠁢󠁥󠁮󠁧󠁿 BYRON SOMEONESON — THE KID\nSpain won their group. Ben picked Spain. Ben may have done this entirely on instinct and has not lost a moment of sleep over it.",
        "#5 🇫🇷 BRIAN'S 1ST BORN — THE OVERACHIEVER\nSteven picked France, France went 3-0 with 10 goals. He tries very hard. It is currently working. The Commissioner remains unimpressed on principle. Several concussions.",
        "#6 🏴󠁧󠁢󠁥󠁮󠁧󠁿 JE SUIS BAGUETTE — THE DARK HORSE\nEngland won Group L. Henry is a lawyer who has known this friend group since high school. He is quietly doing everything right. The Commissioner is not fooled by the baguette.",
        "#7 🇫🇷 MIKE W — THE SLEEPER\nFrance 3-0. Mike W is scary smart, has already calculated the bracket probabilities, and is saying nothing about it. He is the person you forget about until he's suddenly in first place.",
        "#8 🇪🇸 G3 — THE STEADY HAND\nGordon picked Spain, Spain won clean. He is not worried. He has never been visibly worried about anything. Probably thinking about a Sip of Sunshine.",
        "#9 🇪🇸 CHRIS L — THE WILDCARD\nSpain won the group. Chris is heading to France for the first time. He asked if France has coffee. His bracket picks are fine. His general preparedness for France is an open question.",
        "#10 🇪🇸 FIFA WORLD PEACE (OF SHIT) PRIZE — THE CHAOS ENTRY\nChad picked Spain, Spain delivered. He has survived losing an engagement ring in Italy and dropping car keys in a toilet. He is not rattled. The Commissioner has a feeling his ceiling is higher than his entry name suggests.",
        "#11 🇫🇷 CROISSANT — UNBOTHERED\nKat picked France. France is 3-0. Kat has not checked the score. Kat is thinking about what to eat. She will become part croissant and has fully accepted this. All is well.",
        "#12 🇫🇷 CAROLINE — THE SOUND OF MUSIC ENTRY\nCaroline picked France because France sounded good. France is 3-0. Caroline does not know this. She drove Alex and Brian to the emergency room on their wedding day and did not panic once. She is unshakeable. Her bracket is fine.",
        "#13 🇧🇷 48 TEAMS, NO CLUE! — CALLING FROM NC\nBarry picked Brazil. Brazil won their group. Barry is in North Carolina, Manhattan in hand, and has gone to take his contacts out. His pick is alive. He is unaware.",

    return(
      <div style={S.app}>
        <header style={S.hdr}>
          <div style={{fontSize:14,fontWeight:900,letterSpacing:2,color:"#c9a227",fontFamily:"'Courier New',monospace"}}>⚽ WC 2026 POOL</div>
          <nav style={{display:"flex",gap:5,alignItems:"center"}}>
            <button style={S.nav(false)} onClick={()=>setScreen("leaderboard")}>← Leaderboard</button>

          <div style={{fontSize:20,fontWeight:900,color:"#c9a227",letterSpacing:2,marginBottom:2,fontFamily:"'Courier New',monospace"}}>📋 COMMISSIONER'S REPORT</div>

              ))}
            </div>
          ))}
        </div>
      </div>
    );
  }


  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
